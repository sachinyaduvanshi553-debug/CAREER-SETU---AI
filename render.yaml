# render.yaml — Render Deployment Blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: career-setu-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MONGO_URL
        sync: false   # REQUIRED: e.g. mongodb+srv://...
      - key: DB_NAME
        value: career_setu
      - key: GEMINI_API_KEY
        sync: false   # REQUIRED: your Gemini key
      - key: JWT_SECRET_KEY
        sync: false   # REQUIRED: random string for security
      - key: ALLOWED_ORIGINS
        sync: false   # Optional: set to frontend URL
      - key: ADZUNA_APP_ID
        value: 59e4ea87
      - key: ADZUNA_APP_KEY
        value: 6905e87415d0ab06ddd1e64f25332124

  - type: web
    name: career-setu-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: career-setu-backend
          type: web
          property: host
        # Since Next.js uses NEXT_PUBLIC_ at build time, 
        # Render will automatically pass this as a build arg if defined here.
